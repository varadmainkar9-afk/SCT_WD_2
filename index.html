<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculator</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#1f1c2c,#928dab);
}

.calculator{
    width:340px;
    background:#222;
    padding:20px;
    border-radius:20px;
    box-shadow:0 10px 25px rgba(0,0,0,.4);
}

.display{
    width:100%;
    height:70px;
    margin-bottom:20px;
}

.display input{
    width:100%;
    height:100%;
    border:none;
    outline:none;
    border-radius:10px;
    background:#111;
    color:#fff;
    font-size:30px;
    text-align:right;
    padding:15px;
}

.buttons{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:12px;
}

button{
    height:65px;
    border:none;
    border-radius:12px;
    font-size:22px;
    cursor:pointer;
    transition:.2s;
    background:#444;
    color:white;
}

button:hover{
    transform:scale(1.05);
    background:#666;
}

.operator{
    background:#ff9500;
}

.operator:hover{
    background:#ffad33;
}

.equal{
    background:#28a745;
    grid-column:span 2;
}

.equal:hover{
    background:#3bc55b;
}

.clear{
    background:#dc3545;
}

.clear:hover{
    background:#ef4f5f;
}
</style>
</head>

<body>

<div class="calculator">

<div class="display">
<input type="text" id="screen" readonly>
</div>

<div class="buttons">

<button class="clear">C</button>
<button>⌫</button>
<button>%</button>
<button class="operator">/</button>

<button>7</button>
<button>8</button>
<button>9</button>
<button class="operator">*</button>

<button>4</button>
<button>5</button>
<button>6</button>
<button class="operator">-</button>

<button>1</button>
<button>2</button>
<button>3</button>
<button class="operator">+</button>

<button>0</button>
<button>.</button>
<button class="equal">=</button>

</div>

</div>

<script>

const screen = document.getElementById("screen");
const buttons = document.querySelectorAll("button");

buttons.forEach(button => {

button.addEventListener("click", () => {

const value = button.textContent;

if(value === "C"){
screen.value = "";
}

else if(value === "⌫"){
screen.value = screen.value.slice(0,-1);
}

else if(value === "="){

calculate();

}

else{

screen.value += value;

}

});

});

function calculate(){

try{

if(screen.value.trim()==="") return;

let result = eval(screen.value);

if(result===Infinity || result===-Infinity){
screen.value="Error";
}
else{
screen.value=result;
}

}
catch{

screen.value="Error";

}

}

// Keyboard Support

document.addEventListener("keydown",(e)=>{

const key = e.key;

if((key>="0" && key<="9") ||
key==="+" ||
key==="-" ||
key==="*" ||
key==="/" ||
key==="." ||
key==="%"){

screen.value += key;

}

else if(key==="Enter"){

e.preventDefault();
calculate();

}

else if(key==="Backspace"){

screen.value = screen.value.slice(0,-1);

}

else if(key==="Delete"){

screen.value="";

}

else if(key==="Escape"){

screen.value="";

}

});

</script>

</body>
</html>
